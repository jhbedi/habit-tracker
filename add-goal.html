<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="getItRight - Add and manage your goals">
    <title>getItRight - Add Goal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="theme-switch.js"></script>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="app-container compact">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="6"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>
                <h1>getItRight</h1>
            </div>
            <nav class="nav" aria-label="Main navigation">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="tracking.html" class="nav-link">Track Progress</a>
                <a href="add-goal.html" class="nav-link active">Add Goal</a>
                <a href="ai-insights.html" class="nav-link">AI Insights</a>
                <button id="themeToggleBtn" class="nav-icon-btn" title="Toggle Theme" aria-label="Toggle dark and light theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="nav-logout" onclick="handleLogout()" title="Sign out" aria-label="Sign out of your account">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </nav>
        </header>

        <!-- Add Goal Form -->
        <main class="main-content">
            <section class="form-section">
                <h2>Add New Goal</h2>

                <form id="goalForm" class="goal-form">
                    <div class="form-group">
                        <label for="goalTitle">Goal Title <span class="required">*</span></label>
                        <input type="text" id="goalTitle" name="goalTitle" placeholder="What do you want to achieve?"
                            required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="goalCategory">Category</label>
                            <select id="goalCategory" name="goalCategory">
                                <option value="personal">Personal</option>
                                <option value="work">Work</option>
                                <option value="health">Health</option>
                                <option value="finance">Finance</option>
                                <option value="learning">Learning</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="goalPriority">Priority</label>
                            <select id="goalPriority" name="goalPriority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="goalEffort">Effort</label>
                            <select id="goalEffort" name="goalEffort">
                                <option value="easy">Easy</option>
                                <option value="medium" selected>Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="goalStartDate">Start Date <span class="required">*</span></label>
                            <input type="date" id="goalStartDate" name="goalStartDate" required>
                        </div>
                        <div class="form-group">
                            <label for="goalEndDate">End Date <span class="required">*</span></label>
                            <input type="date" id="goalEndDate" name="goalEndDate" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="timePerDay">Hours per Day</label>
                            <input type="number" id="timePerDay" name="timePerDay" min="0.5" max="12" step="0.5"
                                value="1" placeholder="e.g. 1.5">
                        </div>
                        <div class="form-group">
                            <label for="daysPerWeek">Days per Week</label>
                            <select id="daysPerWeek" name="daysPerWeek">
                                <option value="1">1 day</option>
                                <option value="2">2 days</option>
                                <option value="3">3 days</option>
                                <option value="4">4 days</option>
                                <option value="5">5 days</option>
                                <option value="6">6 days</option>
                                <option value="7" selected>Every day</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Add Goal</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite">
        <span class="toast-message">Goal added!</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth-guard.js"></script>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script src="ai-engine.js"></script>
    <script src="gemini.js"></script>
    <script src="chat-widget.js"></script>
</body>

</html>
