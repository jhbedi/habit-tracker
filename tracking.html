<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="getItRight - Track your daily progress">
    <title>getItRight - Track Progress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="theme-switch.js"></script>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="app-container compact">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="6"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>
                <h1>getItRight</h1>
            </div>
            <nav class="nav" aria-label="Main navigation">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="tracking.html" class="nav-link active">Track Progress</a>
                <a href="add-goal.html" class="nav-link">Add Goal</a>
                <a href="ai-insights.html" class="nav-link">AI Insights</a>
                <button id="themeToggleBtn" class="nav-icon-btn" title="Toggle Theme" aria-label="Toggle dark and light theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="nav-logout" onclick="handleLogout()" title="Sign out" aria-label="Sign out of your account">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </nav>
        </header>

        <!-- Tracking Content -->
        <main class="main-content" id="main-content" role="main">
            <!-- Week Navigation -->
            <div class="week-header">
                <button class="week-nav-btn" id="prevWeek" aria-label="Previous week">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <span class="week-display" id="weekDisplay">Jan 20 - Jan 26</span>
                <button class="week-nav-btn" id="nextWeek" aria-label="Next week">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Goals Card -->
            <section class="tracking-card">
                <div class="tracking-header">
                    <span class="day-header"></span>
                    <span class="actions-header"></span>
                    <div class="days-row" id="daysHeader">
                        <!-- Days will be inserted here -->
                    </div>
                </div>

                <div id="goalsList" class="goals-list">
                    <!-- Goals will be inserted here -->
                </div>

                <div class="empty-state" id="emptyState" style="display: none;">
                    <p>No goals yet. <a href="add-goal.html">Add a goal</a> to get started.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="modal">
            <h3 id="confirmTitle">Confirm Action</h3>
            <p id="confirmMessage">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
                <button class="btn btn-danger" id="confirmAction">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay" style="display: none;">
        <div class="modal modal-large">
            <h3>Edit Goal</h3>
            <form id="editForm" class="goal-form">
                <input type="hidden" id="editGoalId">
                <div class="form-group">
                    <label for="editTitle">Goal Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editCategory">Category</label>
                        <select id="editCategory">
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="health">Health</option>
                            <option value="finance">Finance</option>
                            <option value="learning">Learning</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editPriority">Priority</label>
                        <select id="editPriority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editEffort">Effort</label>
                        <select id="editEffort">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editStartDate">Start Date</label>
                        <input type="date" id="editStartDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editEndDate">End Date</label>
                        <input type="date" id="editEndDate" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="editCancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite">
        <span class="toast-message">Updated!</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth-guard.js"></script>
    <script src="shared.js"></script>
    <script src="tracking.js"></script>
    <script src="ai-engine.js"></script>
    <script src="gemini.js"></script>
    <script src="chat-widget.js"></script>
</body>

</html>
